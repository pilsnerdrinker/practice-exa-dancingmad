<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>P5 エクサ練習（混沌の終末） - 絶妖星乱舞</title>
<style>
:root{
  --bg:#151820;--card:#202632;--border:#46505f;
  --text:#f1eadf;--muted:#b9ad9e;--accent:#45b49f;
  --good:#3dd68c;--bad:#f75f6e;--warn:#f7c144;
  --exa:#f0a030;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;font-size:14px;min-height:100vh;padding:14px 0 22px}
.app{width:min(1380px,calc(100% - 20px));margin:0 auto}
.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.head-main{min-width:0}
h1{font-size:clamp(24px,3.5vw,34px);font-weight:900;color:var(--text);letter-spacing:0;margin-bottom:4px}
.head-links{display:flex;gap:8px;flex-wrap:wrap}
.pill-link{display:inline-flex;align-items:center;min-height:36px;padding:7px 11px;border:1px solid var(--border);border-radius:8px;background:#171d27;color:#fff;text-decoration:none;font-weight:800;font-size:13px}
.lang-switch,.tabs{display:inline-flex;align-items:center;gap:0;padding:4px;border:1px solid var(--border);border-radius:999px;background:#111722;box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
.lang-switch{flex:0 0 auto}
.tabs .tab,.lang-switch .lang-btn{border:0;background:transparent;color:#d8cdbf;border-radius:999px;font-weight:900;cursor:pointer;transition:background .16s,color .16s,box-shadow .16s}
.tabs .tab{padding:8px 16px;font-size:13px}
.lang-switch .lang-btn{min-width:42px;padding:7px 10px;font-size:12px;text-transform:uppercase}
.tabs .tab.active,.lang-switch .lang-btn.active{background:#2c8d7d;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.22),0 0 0 1px rgba(85,200,180,.45) inset}
.tabs .tab:hover,.lang-switch .lang-btn:hover{color:#fff}
.ctrl{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;align-items:center}
button{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-weight:700;font-size:12px;cursor:pointer}
button:hover{border-color:var(--accent)}
button.primary{background:#2c8d7d;color:#fff;border-color:#36a08f;font-weight:900}
button.ghost{color:var(--muted)}
button.compact{padding:7px 10px}
button.toggle.active{background:#2c8d7d;color:#fff;border-color:#55c8b4}
.speed-control{display:inline-flex;align-items:center;gap:6px;padding:5px 8px;border:1px solid var(--border);border-radius:8px;background:#171d27;color:var(--muted);font-weight:800;font-size:11px}
.speed-control input{width:92px;accent-color:var(--accent)}
.speed-control span{min-width:30px;color:var(--text);text-align:right}
.modebar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:#202632;border:1px solid var(--border);border-radius:8px 8px 0 0;padding:12px;margin-top:10px}
.main{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:flex-start;background:#202632;border:1px solid var(--border);border-top:0;border-radius:0 0 8px 8px;padding:10px}
.arena-wrap{position:relative;width:min(96vw,760px);flex:1 1 700px;max-width:760px;user-select:none;-webkit-user-select:none}
svg{display:block;width:100%;height:auto;background:#111722;border-radius:8px;border:1px solid var(--border);touch-action:none;user-select:none;-webkit-user-select:none}
svg text{user-select:none;-webkit-user-select:none;pointer-events:none}
.side{width:min(100%,560px);display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.panel{min-width:0;background:#171d27;border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.panel .k{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.log{height:240px;overflow-y:auto;font-size:12px;line-height:1.5;display:flex;flex-direction:column-reverse;gap:2px}
.log .e{color:var(--muted);padding:2px 4px;border-radius:4px}
.log .ok{color:#b6ffd6;background:rgba(61,214,140,.08)}
.log .ng{color:#ffd1d6;background:rgba(247,95,110,.08)}
.log .sys{color:#84d8ca}
.bignum{font-size:34px;font-weight:900;line-height:1.05}
.qtext{font-size:13px;line-height:1.6;min-height:58px}
.status-note{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.65}
.count-overlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:72px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(143,211,255,.9);pointer-events:none;opacity:0;transition:opacity .15s}
.count-overlay.show{opacity:1}
.result-overlay{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;min-width:132px;padding:9px 15px;border:1px solid currentColor;border-radius:11px;background:rgba(17,23,34,.88);text-align:center;font-size:clamp(16px,2.4vw,22px);font-weight:800;line-height:1.2;letter-spacing:.01em;box-shadow:0 7px 20px rgba(0,0,0,.28);pointer-events:none;opacity:0;visibility:hidden;transition:opacity .16s,visibility .16s}
.result-overlay.show{opacity:1;visibility:visible}
.result-overlay.good{color:#8ee4b7;background:rgba(21,48,42,.9)}
.result-overlay.bad{color:#e5c28f;background:rgba(49,42,31,.9)}
.center-start{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);min-width:148px;min-height:54px;border-radius:10px;border:2px solid #55c8b4;background:rgba(44,141,125,.94);color:#fff;font-size:18px;font-weight:900;box-shadow:0 10px 28px rgba(0,0,0,.35);z-index:2}
.center-start.hidden{display:none}
.slide-nav{position:absolute;right:10px;top:10px;display:flex;align-items:center;gap:6px;z-index:3;background:rgba(23,29,39,.9);border:1px solid var(--border);border-radius:8px;padding:4px}
.slide-nav.hidden{display:none}
.slide-nav button{min-width:30px;min-height:28px;padding:2px 7px;border-radius:6px}
.slide-nav span{min-width:68px;text-align:center;font-weight:900;color:#f1eadf}
.hitflash{position:absolute;inset:0;border-radius:8px;background:rgba(247,95,110,.35);pointer-events:none;opacity:0}
.hitflash.show{opacity:1;transition:none}
.hitflash{transition:opacity .4s}
.hidden{display:none!important}
.tele-c{fill:rgba(240,160,48,.38);stroke:rgba(255,217,160,.9);stroke-width:.7}
.tele-c.nextw{fill:rgba(240,160,48,.13);stroke:rgba(255,217,160,.45);stroke-dasharray:2 1.4}
.pos-tele{fill:rgba(240,160,48,.30);stroke:rgba(255,217,160,.86);stroke-width:.6}
.pos-tele-arrow{fill:none;stroke:#ffe2b8;stroke-width:.95;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
.trail-strip{display:none}
.exa-c{fill:rgba(240,160,48,.48);stroke:#ffd9a0;stroke-width:.45}
.exa-arrow{fill:none;stroke:#ffe2b8;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;opacity:.95}
.gridline{stroke:rgba(255,255,255,.06);stroke-width:.3}
.mk{font-size:4.2px;font-weight:900;fill:#fff;text-anchor:middle;dominant-baseline:middle;paint-order:stroke;stroke:#000;stroke-width:.5}
.mk.abc{fill:#ff9a9a}
.mk.num{fill:#9ad0ff}
#playerDot{fill:#5ee0a0;stroke:#fff;stroke-width:.6}
.qmark{stroke-width:.8;fill:none}
.pos-band{fill:rgba(229,155,47,.34);stroke:rgba(255,217,160,.78);stroke-width:.45}
.pos-band.next{fill:rgba(229,155,47,.12);stroke:rgba(255,217,160,.45);stroke-dasharray:2 1.4}
.pos-label{font-size:4px;font-weight:900;fill:#f1eadf;text-anchor:middle;paint-order:stroke;stroke:#000;stroke-width:.45}
</style>
</head>
<body>
<div class="app">
<div class="page-head">
  <div class="head-main">
    <h1 data-i18n="appTitle">P5 エクサ練習（混沌の終末） - 絶妖星乱舞</h1>
    <div class="head-links">
      <a class="pill-link" href="https://github.com/pilsnerdrinker/practice-exa-dancingmad#readme" target="_blank" rel="noopener" data-i18n="readme">README</a>
      <a class="pill-link" href="https://pilsnerdrinker.github.io/raidshelf/" target="_blank" rel="noopener" data-i18n="raidshelf">他の練習ページ：raidshelf</a>
    </div>
  </div>
  <div class="lang-switch" aria-label="Language">
    <button type="button" class="lang-btn" id="langJa" onclick="setLang('ja')">JA</button>
    <button type="button" class="lang-btn" id="langEn" onclick="setLang('en')">EN</button>
  </div>
</div>

<div class="modebar">
  <div class="tabs">
    <div class="tab" id="tabQuiz" onclick="setMode('quiz')" data-i18n="position">位置確認</div>
    <div class="tab active" id="tabRt" onclick="setMode('rt')" data-i18n="practice">実践練習</div>
  </div>
  <div class="ctrl hidden" id="ctrlQuiz">
    <button class="ghost" onclick="quizPrevProblem()" data-i18n="prevProblem">前の問題</button>
    <button class="primary" onclick="quizNew()" data-i18n="newProblem">新しい問題</button>
    <button class="ghost toggle compact" id="stepBtn1" onclick="toggleStepMode()" data-i18n="oneByOne">一問ごと</button>
    <button class="ghost compact" id="markerBtn1" onclick="toggleMarkerPreset()">2341</button>
    <button class="ghost toggle compact" id="rotBtn1" onclick="toggleRot()">45度</button>
  </div>
  <div class="ctrl" id="ctrlRt">
    <button class="primary" id="rtStartBtn" onclick="rtStart(false)" data-i18n="start">▶ スタート</button>
    <button id="rtPauseBtn" onclick="rtTogglePause()" data-i18n="pause">⏸ 一時停止</button>
    <button onclick="rtStart(true)" data-i18n="sameProblem">同じ問題</button>
    <button onclick="rtPrevProblem()" data-i18n="prevProblem">前の問題</button>
    <button onclick="rtNewProblem()" data-i18n="newProblem">新しい問題</button>
    <button class="ghost toggle compact" id="stepBtn2" onclick="toggleStepMode()" data-i18n="oneByOne">一問ごと</button>
    <label class="speed-control"><span data-i18n="speed">速度</span>
      <input id="speedSlider" type="range" min="2.5" max="5.0" step="0.1" value="3.6" oninput="setExaSpeed(this.value)">
      <span id="speedValue">3.6s</span>
    </label>
    <button class="ghost compact" id="markerBtn2" onclick="toggleMarkerPreset()">2341</button>
    <button class="ghost toggle compact" id="rotBtn2" onclick="toggleRot()">45度</button>
  </div>
</div>

<div class="main">
  <div class="arena-wrap">
    <svg id="svg" viewBox="-14 -14 128 128">
      <defs>
        <clipPath id="arenaClip"><circle cx="50" cy="50" r="48"/></clipPath>
      </defs>
      <g id="viewG">
        <circle cx="50" cy="50" r="48" fill="#151d2e" stroke="#33435f" stroke-width="0.6"/>
        <g clip-path="url(#arenaClip)" id="gridG"></g>
        <g id="positionLayer"></g>
        <!-- 北西→南東レーン群（-45回転） -->
        <g><g id="gNW" transform="rotate(-45 50 50)"></g></g>
        <!-- 北東→南西レーン群（+45回転） -->
        <g><g id="gNE" transform="rotate(45 50 50)"></g></g>
        <circle cx="50" cy="50" r="18" fill="none" stroke="rgba(255,120,120,.6)" stroke-width="0.5"/>
        <g id="markersG"></g>
        <g id="quizMarks"></g>
        <circle id="playerDot" r="1.8" cx="50" cy="50"/>
      </g>
    </svg>
    <div class="count-overlay" id="countOverlay"></div>
    <div class="result-overlay" id="resultOverlay" aria-live="polite"></div>
    <button type="button" class="center-start" id="centerStartBtn" onclick="rtStart(false)" data-i18n="start">▶ スタート</button>
    <div class="slide-nav hidden" id="slideNav">
      <button type="button" onclick="movePositionSlide(-1)">＜</button>
      <span id="slideNo">1/7</span>
      <button type="button" onclick="movePositionSlide(1)">＞</button>
    </div>
    <div class="hitflash" id="hitFlash"></div>
  </div>

  <div class="side">
    <div class="panel hidden" id="quizPanel">
      <div class="k" data-i18n="slide">スライド</div>
      <div class="qtext" id="qText">1回目予兆</div>
      <div style="display:flex;gap:14px;margin-top:6px">
        <div><div class="k" data-i18n="display">表示</div><div class="bignum" id="qNum">1/7</div></div>
      </div>
    </div>
    <div class="panel" id="rtPanel">
      <div class="k" data-i18n="status">状況</div>
      <div style="display:flex;gap:14px">
        <div><div class="k" data-i18n="wave">ウェーブ</div><div class="bignum" id="rtWave">-/6</div></div>
        <div><div class="k" data-i18n="hits">被弾</div><div class="bignum" style="color:var(--bad)" id="rtHits">0</div></div>
      </div>
      <p class="status-note">
        <span data-i18n="controlsNote">マウス/指・WASD・パッド左スティック/十字キーでキャラを動かせます（移動速度制限あり）。</span><br><span id="speedHelp">予兆3.7s→発動3.6s。全6回。</span><br><span data-i18n="spreadNote">エクサ後に散会するため、散会位置を意識してください。</span>
      </p>
    </div>
    <div class="panel">
      <div class="k" data-i18n="log">ログ</div>
      <div class="log" id="logBox"></div>
    </div>
  </div>
</div>
</div>

<script>
'use strict';

// ================= 言語 =================
const I18N = {
  ja: {
    appTitle:'P5 エクサ練習（混沌の終末） - 絶妖星乱舞', readme:'README', raidshelf:'他の練習ページ：raidshelf',
    position:'位置確認', practice:'実践練習', prevProblem:'前の問題', newProblem:'新しい問題', oneByOne:'一問ごと',
    start:'▶ スタート', pause:'⏸ 一時停止', resume:'▶ 再開', sameProblem:'同じ問題', speed:'速度',
    status:'状況', wave:'ウェーブ', hits:'被弾', slide:'スライド', display:'表示', log:'ログ',
    controlsNote:'マウス/指・WASD・パッド左スティック/十字キーでキャラを動かせます（移動速度制限あり）。',
    spreadNote:'エクサ後に散会するため、散会位置を意識してください。',
    patternLeft:'左', patternCenter:'中', patternRight:'右', nw:'北西', ne:'北東', telegraph:'予兆', line:'直線',
    rotDefault:'45度', rotRight:'右45', rotLeft:'左45', noPrev:'前の問題はありません',
    continuousMode:'連続モード', oneByOneMode:'一問ごとモード', modePrompt:'モードを選んで開始してください',
    practiceStart:'実践練習開始', noDamage:'🎉 ノーダメージクリア！', resultHits:(n)=>n===0?'パーフェクト':`${n}ヒット`, danger:'危険範囲', safeOk:'安地OK',
    speedHelp:(sec)=>`予兆3.7s→発動${sec}s。全6回。`,
    positionProblem:(n)=>`位置確認：${n}問目`, practiceProblem:(n)=>`実践練習：${n}問目`,
    waveLabel:(i,dir,pat)=>`${i}回目：${dir} ${pat}`,
    lineLabel:(name)=>`直線：${name}`, telegraphLabel:(name)=>`予兆：${name}`,
    slideText:(n)=>{
      const a=['1枚目：1回目予兆','2枚目：1回目レーンの直線と2回目予兆','3枚目：2回目レーンの直線と3回目予兆','4枚目：3回目レーンの直線と4回目予兆','5枚目：4回目レーンの直線と5回目予兆','6枚目：5回目レーンの直線と6回目予兆','7枚目：6回目レーンの直線'];
      return a[n-1]||'';
    },
    slideHit:(n)=>`${n}枚目 ✘ 危険範囲`, slideSafe:(n)=>`${n}枚目 ✔ 安地OK`, waveHit:(n)=>`${n}回目 ✘ 被弾！`, finishHits:(n)=>`終了：被弾 ${n} 回`
  },
  en: {
    appTitle:'P5 Exaflare Practice (Stray Apocalypse) -Dancing Mad (Ultimate)', readme:'README', raidshelf:'Other practice pages: raidshelf',
    position:'Position Check', practice:'Practice', prevProblem:'Previous', newProblem:'New Problem', oneByOne:'One-by-one',
    start:'▶ Start', pause:'⏸ Pause', resume:'▶ Resume', sameProblem:'Retry', speed:'Speed',
    status:'Status', wave:'Wave', hits:'Hits', slide:'Slide', display:'View', log:'Log',
    controlsNote:'Move your character with mouse/touch, WASD, or gamepad left stick / D-pad. Movement speed is limited.',
    spreadNote:'Remember your spread position after Exaflares.',
    patternLeft:'Left', patternCenter:'Middle', patternRight:'Right', nw:'NW', ne:'NE', telegraph:'Telegraph', line:'Line',
    rotDefault:'45°', rotRight:'R45', rotLeft:'L45', noPrev:'No previous problem.',
    continuousMode:'Continuous mode', oneByOneMode:'One-by-one mode', modePrompt:'Choose a mode and start.',
    practiceStart:'Practice started', noDamage:'🎉 No-damage clear!', resultHits:(n)=>n===0?'Perfect':`${n} Hit${n===1?'':'s'}`, danger:'Danger zone', safeOk:'Safe spot OK',
    speedHelp:(sec)=>`Telegraph 3.7s → Exa ${sec}s. 6 waves total.`,
    positionProblem:(n)=>`Position Check: Problem ${n}`, practiceProblem:(n)=>`Practice: Problem ${n}`,
    waveLabel:(i,dir,pat)=>`Wave ${i}: ${dir} ${pat}`,
    lineLabel:(name)=>`Line: ${name}`, telegraphLabel:(name)=>`Telegraph: ${name}`,
    slideText:(n)=>{
      const a=['Slide 1: 1st telegraph','Slide 2: 1st line + 2nd telegraph','Slide 3: 2nd line + 3rd telegraph','Slide 4: 3rd line + 4th telegraph','Slide 5: 4th line + 5th telegraph','Slide 6: 5th line + 6th telegraph','Slide 7: 6th line only'];
      return a[n-1]||'';
    },
    slideHit:(n)=>`Slide ${n} ✘ Danger zone`, slideSafe:(n)=>`Slide ${n} ✔ Safe spot OK`, waveHit:(n)=>`Wave ${n} ✘ Hit!`, finishHits:(n)=>`Finished: ${n} hit(s)`
  }
};
let currentLang='ja';
function t(key,...args){
  const v=(I18N[currentLang]&&I18N[currentLang][key])||I18N.ja[key]||key;
  return typeof v==='function' ? v(...args) : v;
}
function getInitialLang(){
  const q=new URLSearchParams(location.search).get('lang');
  const saved=localStorage.getItem('p5_exa_lang');
  return (q==='en'||q==='ja') ? q : (saved==='en'||saved==='ja' ? saved : 'ja');
}
function setLang(lang){
  currentLang = lang==='en' ? 'en' : 'ja';
  localStorage.setItem('p5_exa_lang', currentLang);
  const url=new URL(location.href);
  if(currentLang==='en') url.searchParams.set('lang','en'); else url.searchParams.delete('lang');
  history.replaceState(null,'',url);
  document.documentElement.lang=currentLang;
  document.title=t('appTitle');
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.getElementById('langJa').classList.toggle('active',currentLang==='ja');
  document.getElementById('langEn').classList.toggle('active',currentLang==='en');
  updateRotButtons();
  updateFlowButtons();
  updateSpeedDisplay();
  updatePauseButton();
  if(resultOverlay.classList.contains('show')) showResultOverlay(rt.hits);
  if(mode==='quiz') renderPositionSlide();
}
window.setLang=setLang;
// ================= 定数（調整はここ） =================
const LANES = 5;                 // 各方向のレーン数
const FIELD_R = 48;
const CX=50, CY=50;
const LANE_W = (FIELD_R*2)/LANES;   // 19.2
const EXA_R = LANE_W*0.55;          // エクサ円の半径
const EXA_STEPS = 7;                // 1レーン内で順番に発動する回数
const TELEGRAPH_MS = 3700;          // 予兆時間
const TELEGRAPH_BLINKS = 3;         // 予兆矢印の表示回数
let TRAVEL_MS   = 3600;             // 1〜7個目の発動にかかる時間
const WAVE_INTERVAL = TELEGRAPH_MS * 2 / 3; // 3回目表示と次予兆1回目を合わせる
const COUNT_MS = 3000;              // 3カウント
const PLAYER_SPEED = 0.020;         // units/ms（移動速度）
// パターン: 1レーン空きのペア
const PATTERNS = { L:[0,2], C:[1,3], R:[2,4] };
const PAT_KEY = { L:'patternLeft', C:'patternCenter', R:'patternRight' };
function patternLabel(p){ return t(PAT_KEY[p]); }
function directionLabel(dir){ return t(dir==='NW'?'nw':'ne'); }

// ================= 共通状態 =================
let mode='rt';
let viewRot=0;   // 0=通常表示 45=右45度 -45=左45度
let nextRot=45;
let markerPreset='2341';
let waves=[];    // [{dir:'NW'|'NE', pat:'L'|'C'|'R'}] ×6
let positionSlide=0;
let oneByOne=false;
let problemHistory=[];
let problemIndex=-1;
let quizAdvanceTimer=null;
const inputState={keys:Object.create(null), pointerActive:false};

const svg=document.getElementById('svg');
const gNW=document.getElementById('gNW');
const gNE=document.getElementById('gNE');
const viewG=document.getElementById('viewG');
const quizMarks=document.getElementById('quizMarks');
const playerDot=document.getElementById('playerDot');
const centerStartBtn=document.getElementById('centerStartBtn');
const resultOverlay=document.getElementById('resultOverlay');
const positionLayer=document.getElementById('positionLayer');
const slideNav=document.getElementById('slideNav');
const slideNo=document.getElementById('slideNo');

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function genWaves(){
  const nw=shuffle(['L','C','R']), ne=shuffle(['L','C','R']);
  const w=[];
  for(let i=0;i<3;i++){ w.push({dir:'NW',pat:nw[i]}); w.push({dir:'NE',pat:ne[i]}); }
  return w;
}
function copyWaves(src){ return src.map(w=>({dir:w.dir,pat:w.pat})); }
function commitProblem(nextWaves){
  waves=copyWaves(nextWaves);
  if(problemIndex<problemHistory.length-1) problemHistory=problemHistory.slice(0,problemIndex+1);
  problemHistory.push(copyWaves(waves));
  problemIndex=problemHistory.length-1;
}
function ensureProblem(){
  if(waves.length===0) commitProblem(genWaves());
  else if(problemHistory.length===0){ problemHistory=[copyWaves(waves)]; problemIndex=0; }
}
function loadProblemAt(index,slide){
  if(index<0||index>=problemHistory.length)return false;
  problemIndex=index;
  waves=copyWaves(problemHistory[problemIndex]);
  positionSlide=slide;
  renderPositionSlide();
  log(t('positionProblem',problemIndex+1),'sys');
  return true;
}
function loadPrevProblem(slide){
  const target=problemIndex-1;
  if(target<0){
    log(t('noPrev'),'sys');
    return false;
  }
  return loadProblemAt(target,slide);
}
function positionNextProblem(){
  commitProblem(genWaves());
  positionSlide=0;
  renderPositionSlide();
  log(t('positionProblem',problemIndex+1),'sys');
}
function laneX(lane){ return CX + (lane-(LANES-1)/2)*LANE_W; }
function rotPt(x,y,deg){
  const r=deg*Math.PI/180, c=Math.cos(r), s=Math.sin(r);
  const dx=x-CX, dy=y-CY;
  return { x: CX + dx*c - dy*s, y: CY + dx*s + dy*c };
}
// world座標 → 各方向レーンのローカル座標
function toLocal(pt,dir){ return rotPt(pt.x,pt.y, dir==='NW'?45:-45); }
function inLaneStrip(pt,dir,lane){
  const l=toLocal(pt,dir);
  return Math.abs(l.x-laneX(lane)) <= LANE_W/2;
}
function inWaveStrips(pt,w){ return PATTERNS[w.pat].some(l=>inLaneStrip(pt,w.dir,l)); }

function evtToWorld(e){

function exaStepY(step){
  const y0=-EXA_R*0.35;
  const y1=100+EXA_R*0.35;
  return y0+(y1-y0)*(step/(EXA_STEPS-1));
}

// 各waveにつき: 外周予兆円×2, 矢印×2, エクサ円グループ
function buildWaveEls(){
  gNW.innerHTML=''; gNE.innerHTML='';
  waves.forEach((w,k)=>{
    const g = w.dir==='NW' ? gNW : gNE;
    const lanes=PATTERNS[w.pat];
    const wrap=document.createElementNS('http://www.w3.org/2000/svg','g');
    wrap.setAttribute('id',`wave${k}`);
    let html='';
    lanes.forEach(l=>{
      const x=laneX(l)-LANE_W/2;
      html+=`<rect class="trail-strip hidden" data-role="trail" x="${x}" y="-12" width="${LANE_W}" height="124"/>`;
      html+=`<circle class="tele-c hidden" data-role="tele" cx="${laneX(l)}" cy="${-EXA_R*0.35}" r="${EXA_R}"/>`;
      // 進行方向矢印（丸の中で下方向へ点滅）
      const ax=laneX(l);
      html+=`<g class="exa-arrow hidden" data-role="arrow">
        <path d="M ${ax-4} ${-EXA_R*0.65} L ${ax} ${-EXA_R*0.25} L ${ax+4} ${-EXA_R*0.65}"/>
        <path d="M ${ax-4} ${-EXA_R*0.15} L ${ax} ${EXA_R*0.25} L ${ax+4} ${-EXA_R*0.15}"/>
      </g>`;
      // エクサ円列
      html+=`<g data-role="circles" class="hidden">`+
        Array.from({length:EXA_STEPS},(_,i)=>`<circle class="exa-c hidden" data-c="${i}" cx="${ax}" cy="${exaStepY(i)}" r="${EXA_R}"/>`).join('')+
      `</g>`;
    });
    wrap.innerHTML=html;
    g.appendChild(wrap);
  });
}
function waveEls(k){ return document.getElementById(`wave${k}`); }
function setWaveVisual(k,state,progress=null){
  // state: 'pre'|'tele'|'travel'|'done'  progress:0-1(実践時)
  const wrap=waveEls(k); if(!wrap)return;
  const blinkIndex = progress === null ? 0 : Math.floor(Math.min(progress,0.999)*TELEGRAPH_BLINKS);
  const blinkPhase = progress === null ? 0 : Math.min(progress,0.999)*TELEGRAPH_BLINKS-blinkIndex;
  const blinkOn = progress === null || blinkPhase < 0.52;
  wrap.querySelectorAll('[data-role="tele"]').forEach(el=>el.classList.toggle('hidden', state!=='tele'));
  wrap.querySelectorAll('[data-role="arrow"]').forEach(el=>el.classList.toggle('hidden', !(state==='tele' && blinkOn)));
  wrap.querySelectorAll('[data-role="trail"]').forEach(el=>el.classList.add('hidden'));
  wrap.querySelectorAll('[data-role="circles"]').forEach(el=>{
    el.classList.toggle('hidden', state!=='travel');
    if(state==='travel'){
      const unit=Math.min(progress,0.999)*EXA_STEPS;
      const active=Math.min(EXA_STEPS-1,Math.floor(unit));
      const phase=unit-active;
      const pulse=1-phase;
      el.querySelectorAll('circle').forEach((c,i)=>{
        const lingering=i===active-1 && phase<0.32;
        c.classList.toggle('hidden', !(i===active || lingering));
        const opacity=i===active ? 0.55+0.35*pulse : 0.28*(1-phase/0.32);
        c.setAttribute('opacity', String(Math.max(0.08,opacity)));
      });
    }else{
      el.querySelectorAll('circle').forEach(c=>c.classList.add('hidden'));
    }
  });
}

}

function keyVector(){
  let x=0,y=0;
  if(inputState.keys.KeyA||inputState.keys.ArrowLeft) x-=1;
  if(inputState.keys.KeyD||inputState.keys.ArrowRight) x+=1;
  if(inputState.keys.KeyW||inputState.keys.ArrowUp) y-=1;
  if(inputState.keys.KeyS||inputState.keys.ArrowDown) y+=1;
  return normalizeVec(x,y);
}
function gamepadVector(){
  if(!navigator.getGamepads) return {x:0,y:0};
  const pads=navigator.getGamepads();
  for(const gp of pads){
    if(!gp) continue;
    let x=gp.axes[0]||0, y=gp.axes[1]||0;
    const dead=0.22;
    if(Math.abs(x)<dead) x=0;
    if(Math.abs(y)<dead) y=0;
    if(gp.buttons[14]?.pressed) x-=1;
    if(gp.buttons[15]?.pressed) x+=1;
    if(gp.buttons[12]?.pressed) y-=1;
    if(gp.buttons[13]?.pressed) y+=1;
    const v=normalizeVec(x,y);
    if(v.x||v.y) return screenVecToWorld(v);
  }
  return {x:0,y:0};
}
function normalizeVec(x,y){
  const d=Math.hypot(x,y);
  return d>0 ? {x:x/d,y:y/d} : {x:0,y:0};
}
function screenVecToWorld(v){
  if(!viewRot) return v;
  const r=-viewRot*Math.PI/180, c=Math.cos(r), s=Math.sin(r);
  return {x:v.x*c-v.y*s, y:v.x*s+v.y*c};
}
function movementVector(){
  const kv=keyVector();
  if(kv.x||kv.y) return screenVecToWorld(kv);
  return gamepadVector();
}

function rtTick(){
  if(rt.finished){
    if(!oneByOne && rt.nextRunAt && rtNow()>=rt.nextRunAt){
      commitProblem(genWaves());
      prepareRtRun();
    }else{
      return;
    }
  }
  const elapsed=rtNow()-rt.startTime;
  const co=document.getElementById('countOverlay');
  if(elapsed<COUNT_MS){
    co.classList.add('show');
    co.textContent=Math.ceil((COUNT_MS-elapsed)/1000);
  }else{
    co.classList.remove('show');
  }
  // プレイヤー移動（マウス/タッチ/WASD/パッド対応、速度制限つき）
  const dt=16;
  const mv=movementVector();
  if(mv.x||mv.y){
    const step=PLAYER_SPEED*dt;
    rt.player.x+=mv.x*step;
    rt.player.y+=mv.y*step;
    rt.target={x:rt.player.x,y:rt.player.y};
  }else{
    const dx=rt.target.x-rt.player.x, dy=rt.target.y-rt.player.y;
    const dist=Math.hypot(dx,dy);
    if(dist>0.1){
      const step=Math.min(dist,PLAYER_SPEED*dt);
      rt.player.x+=dx/dist*step;
      rt.player.y+=dy/dist*step;
    }
  }
  // アリーナ内にクランプ
  const pr=Math.hypot(rt.player.x-CX,rt.player.y-CY);
  const maxR=FIELD_R-2;
  if(pr>maxR){
    rt.player.x=CX+(rt.player.x-CX)/pr*maxR;
    rt.player.y=CY+(rt.player.y-CY)/pr*maxR;
  }
  playerDot.setAttribute('cx',rt.player.x);
  playerDot.setAttribute('cy',rt.player.y);

  // ウェーブ状態
  let curWave='-';
  waves.forEach((w,k)=>{
    const tk=COUNT_MS+k*WAVE_INTERVAL;
    const tl=tk+TELEGRAPH_MS;
    const te=tl+TRAVEL_MS;
    let state,progress=0;
    if(elapsed<tk)state='pre';
    else if(elapsed<tl){state='tele';progress=(elapsed-tk)/TELEGRAPH_MS;}
    else if(elapsed<te){state='travel';progress=(elapsed-tl)/TRAVEL_MS;curWave=`${k+1}`;}
    else state='done';
    setWaveVisual(k,state,progress);
    // 当たり判定
    if(state==='travel'&&!rt.waveHitFlags[k]){
      const lanes=PATTERNS[w.pat];
      const l=toLocal(rt.player,w.dir);
      const active=Math.min(EXA_STEPS-1,Math.floor(Math.min(progress,0.999)*EXA_STEPS));
      const cy=exaStepY(active);
      for(const lane of lanes){
        if(Math.abs(l.x-laneX(lane))<=LANE_W/2 && Math.abs(l.y-cy)<=EXA_R){
          rt.waveHitFlags[k]=true;
          rt.hits++;
          document.getElementById('rtHits').textContent=rt.hits;
          log(t('waveHit',k+1),'ng');
          const f=document.getElementById('hitFlash');
          f.classList.add('show');
          setTimeout(()=>f.classList.remove('show'),80);
          break;
        }
      }
    }
  });
  document.getElementById('rtWave').textContent=`${curWave}/6`;

  // 終了判定
  const endT=COUNT_MS+(waves.length-1)*WAVE_INTERVAL+TELEGRAPH_MS+TRAVEL_MS+500;
  if(elapsed>endT&&!rt.finished){
    rt.finished=true;
    rt.paused=false;
    document.getElementById('countOverlay').classList.remove('show');
    updatePauseButton();
    waves.forEach((w,k)=>setWaveVisual(k,'done'));
    if(rt.hits===0)log(t('noDamage'),'ok');
    else log(t('finishHits',rt.hits),'sys');
    showResultOverlay(rt.hits);
    if(oneByOne){
      if(rt.timer){clearInterval(rt.timer);rt.timer=null;}
      rt.running=false;
      rt.nextRunAt=0;
    }else{
      // 連続モードでは同じ描画ループを維持し、3秒後に次問を開始する。
      // setTimeoutを別管理しないため、途中で自動進行が消える問題を防ぐ。
      rt.running=true;
      rt.nextRunAt=rtNow()+3000;
    }
    updateCenterStart();
  }
}

// ================= 入力 =================
svg.addEventListener('pointerdown',e=>{
  const pt=evtToWorld(e);
  if(mode==='quiz'){ quizClick(pt); return; }
  rt.target=pt;
  svg.setPointerCapture(e.pointerId);
});
svg.addEventListener('pointermove',e=>{
  if(mode!=='rt'||!rt.running)return;
  if(e.buttons>0||e.pointerType==='touch'){
    rt.target=evtToWorld(e);
  }
});

const moveKeys=new Set(['KeyW','KeyA','KeyS','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight']);
window.addEventListener('keydown',e=>{
  if(!moveKeys.has(e.code)) return;
  inputState.keys[e.code]=true;
  if(mode==='rt') e.preventDefault();
});
window.addEventListener('keyup',e=>{
  if(!moveKeys.has(e.code)) return;
  inputState.keys[e.code]=false;
  if(mode==='rt') e.preventDefault();
});
window.addEventListener('blur',()=>{ inputState.keys=Object.create(null); });

// 初期化
currentLang=getInitialLang();
commitProblem(genWaves());
buildWaveEls();
updateFlowButtons();
updateRotButtons();
updateSpeedDisplay();
setMode(mode);
setLang(currentLang);
log(t('modePrompt'),'sys');
</script>
